name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build site and publish WebAssembly demos
        shell: bash
        run: |
          set -euo pipefail

          dotnet workload install wasm-tools

          git clone https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          pushd "$RUNNER_TEMP/emsdk"
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          popd

          pushd Site
          npm ci
          popd

          pwsh -File ./build-site-and-publish-wasm.ps1

          test -d Site/out
          touch Site/out/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4